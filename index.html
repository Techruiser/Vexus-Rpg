            <div style="width:14px;height:14px;border:1px solid ${hasProf ? "var(--gold)" : "var(--border)"};background:${hasProf ? "var(--gold)" : "transparent"};display:flex;align-items:center;justify-content:center;font-size:9px;color:${hasProf ? "var(--bg)" : "transparent"}">✦</div>
            <span style="flex:1;font-size:14px;color:${hasProf ? "var(--gold)" : "var(--text)"}">${sk.name}</span>
            <span style="font-family:'Cinzel',serif;font-size:16px;color:var(--gold)">${total >= 0 ? "+" + total : total}</span>
          </div>`;
            })
            .join("")}
      </div>
      <p style="font-size:12px;color:var(--text3);font-style:italic">🔒 Editável apenas pelo mestre.</p>`;
                }
            }

            function renderTabInventory(s, isMaster) {
                const inv = s.inventory || [];
                return `
    <div class="section-title"><span>🎒</span> Inventário</div>
    <div class="inventory-list" id="inv-list">
      ${inv
          .map(
              (item, i) => `
        <div class="inv-item" data-inv-idx="${i}">
          <span class="inv-name">${item.name}</span>
          <span style="font-size:12px;color:var(--text2)">${item.desc || ""}</span>
          <input class="inv-qty" type="number" value="${item.qty || 1}" min="0" data-inv-qty="${i}">
          <button class="inv-del" data-inv-del="${i}">✕</button>
        </div>`,
          )
          .join("")}
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="inv-name-input" placeholder="Nome do item" style="flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px;font-family:'Crimson Pro',serif;font-size:14px;outline:none">
      <input id="inv-desc-input" placeholder="Descrição (opcional)" style="flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px;font-family:'Crimson Pro',serif;font-size:14px;outline:none">
      <button class="btn btn-sm btn-green" id="inv-add-btn"><span>+ Adicionar</span></button>
    </div>`;
            }

            function renderTabSpells(s, isMaster) {
                const spells = s.spells || [];
                return `
    <div class="section-title"><span>✨</span> Magias e Habilidades</div>
    <div class="spell-list" id="spell-list">
      ${spells

            // ═══════════════════════════════════════
            // COLLECT DATA FROM CURRENT TAB
            // ═══════════════════════════════════════
            function collectCurrentTabData() {
                if (!S.editData) S.editData = {};
                const d = S.editData;
                const tab = S.activeTab;

                if (tab === "basics") {
                    const fields =
                        S.currentCampaign?.customFields || DEFAULT_FIELDS;
                    fields.forEach((f) => {
                        const el = document.getElementById("f-" + f.key);
                        if (el)
                            d[f.key] =
                                f.type === "number"
                                    ? parseInt(el.value) || 0
                                    : el.value;
                    });
                    const pe = document.getElementById("portrait-emoji");
                    if (pe) d.portrait = pe.value;
                    const pu = document.getElementById("f-playerUid");
                    if (pu) d.playerUid = pu.value || null;
                    document.querySelectorAll("[data-custom]").forEach((el) => {
                        if (!d.custom) d.custom = {};
                        d.custom[el.dataset.custom] =
                            el.type === "number"
                                ? parseInt(el.value) || 0
                                : el.value;
                    });
                }
                if (tab === "stats") {
                    document.querySelectorAll(".stat-input").forEach((el) => {
                        d[el.dataset.key] = parseInt(el.value) || 10;
                    });
                    ["initiative", "ac", "profBonus"].forEach((k) => {
                        const el = document.getElementById("f-" + k);
                        if (el) d[k] = parseInt(el.value) || 0;
                    });
                    document.querySelectorAll("[data-custom]").forEach((el) => {
                        if (!d.custom) d.custom = {};
                        d.custom[el.dataset.custom] = parseInt(el.value) || 0;
                    });
                }
                if (tab === "vitals") {
                    ["hp", "hpMax", "hpTemp", "san", "sanMax"].forEach((k) => {
                        const el = document.getElementById("f-" + k);
                        if (el) d[k] = parseInt(el.value) || 0;
                    });
                    document.querySelectorAll("[data-custom]").forEach((el) => {
                        if (!d.custom) d.custom = {};
                        d.custom[el.dataset.custom] = parseInt(el.value) || 0;
                    });
                }
                if (tab === "skills") {
                    // skills already stored in S.editData.skills via event handlers
                    // also collect bonus inputs
                    document
                        .querySelectorAll(".skill-bonus-input")
                        .forEach((el) => {
                            const name = el.dataset.skillName;
                            if (!d.skills) d.skills = {};
                            if (!d.skills[name]) d.skills[name] = {};
                            d.skills[name].bonus = parseInt(el.value) || 0;
                        });
                }
                if (tab === "inventory") {
                    document
                        .querySelectorAll("[data-inv-qty]")
                        .forEach((el) => {
                            if (d.inventory?.[parseInt(el.dataset.invQty)])

                    if (!file) return;
                    try {
                        toast("Fazendo upload...");
                        const url = await uploadImage(file);

                        const btn = document.getElementById("portrait-btn");

            function bindTabEvents() {
                // STAT MODIFIERS
                document.querySelectorAll(".stat-input").forEach((input) => {
                    input.addEventListener("input", () => {
                        const val = parseInt(input.value) || 10;
                        const mod = Math.floor((val - 10) / 2);
                        const box = input.closest(".stat-box");
                        if (box)
                            box.querySelector(".stat-mod").textContent =
                                mod >= 0 ? "+" + mod : "" + mod;
                    });
                });

                // SKILLS (master only)
                document.querySelectorAll(".skill-row").forEach((el) => {
                    el.addEventListener("click", () => {
                        el.classList.toggle("prof");
                        el.querySelector(".skill-dot").textContent =
                            el.classList.contains("prof") ? "✦" : "";
                    });
                });

                // HP
                const hpCur = () =>
                    parseInt(document.getElementById("hp-cur")?.textContent) ||
                    0;
                const hpMax = () =>
                    parseInt(document.getElementById("f-hpMax")?.value) || 1;
                function updateHP(v) {
                    const cur = Math.max(0, Math.min(hpMax(), v));
                    const pct = Math.max(
                        0,
                        Math.min(100, (cur / hpMax()) * 100),
                    );
                    document.getElementById("hp-cur").textContent = cur;
                    document.getElementById("f-hp").value = cur;
                    document.getElementById("hp-bar").style.width = pct + "%";
                    document.getElementById("hp-max-disp").textContent =
                        hpMax();
                }
                document
                    .getElementById("hp-dmg")
                    ?.addEventListener("click", () => {
                        updateHP(
                            hpCur() -
                                (parseInt(
                                    document.getElementById("hp-delta").value,
                                ) || 1),
                        );
                    });
                document
                    .getElementById("hp-heal")
                    ?.addEventListener("click", () => {
                        updateHP(
                            hpCur() +
                                (parseInt(
                                    document.getElementById("hp-delta").value,
                                ) || 1),
                        );
                    });
                document
                    .getElementById("f-hpMax")
                    ?.addEventListener("input", () => updateHP(hpCur()));

                // SANIDADE
                const sanCur = () =>
                    parseInt(document.getElementById("san-cur")?.textContent) ||
                    0;
                const sanMax = () =>
                    parseInt(document.getElementById("f-sanMax")?.value) || 1;
                function updateSan(v) {
                    const cur = Math.max(0, Math.min(sanMax(), v));
                    const pct = Math.max(
                        0,
                        Math.min(100, (cur / sanMax()) * 100),
                    );
                    if (document.getElementById("san-cur"))
                        document.getElementById("san-cur").textContent = cur;
                    if (document.getElementById("f-san"))
                        document.getElementById("f-san").value = cur;
                    if (document.getElementById("san-bar"))
                        document.getElementById("san-bar").style.width =
                            pct + "%";
                    if (document.getElementById("san-max-disp"))
                        document.getElementById("san-max-disp").textContent =
                            sanMax();
                }
                document
                    .getElementById("san-dmg")
                    ?.addEventListener("click", () => {
                        updateSan(
                            sanCur() -
                                (parseInt(
                                    document.getElementById("san-delta").value,
                                ) || 1),
                        );
                    });
                document
                    .getElementById("san-heal")
                    ?.addEventListener("click", () => {
                        updateSan(
                            sanCur() +
                                (parseInt(
                                    document.getElementById("san-delta").value,
                                ) || 1),
                        );
                    });

                // ENABLE SANITY
                document
                    .getElementById("enable-san-btn")
                    ?.addEventListener("click", async () => {
                        if (!S.currentCampaign) return;
                        await saveCampaign(S.currentCampaign.id, {
                            useSanity: true,
                        });
                        S.currentCampaign.useSanity = true;
                        S.activeTab = "vitals";
                        document.getElementById("tab-content").innerHTML =
                            renderTabContent(
                                "vitals",
                                S.editData || {},
                                canMaster(),
                                S.currentCampaign?.customFields ||
                                    DEFAULT_FIELDS,
                                S.currentCampaign,
                            );
                        bindTabEvents();
                        toast("Sanidade ativada!");
                    });

                // VITAIS EXTRAS
                document.querySelectorAll("[data-vit-dmg]").forEach((el) =>
                    el.addEventListener("click", () => {
                        const k = el.dataset.vitDmg;
                        const cur =
                            parseInt(
                                document.getElementById(`vit-cur-${k}`)
                                    ?.textContent,
                            ) || 0;
                        const max =
                            parseInt(
                                document.getElementById(`vit-maxinput-${k}`)
                                    ?.value,
                            ) || 1;
                        const delta =
                            parseInt(
                                document.getElementById(`vit-delta-${k}`)
                                    ?.value,
                            ) || 1;
                        const nv = Math.max(0, cur - delta);
                        document.getElementById(`vit-cur-${k}`).textContent =
                            nv;
                        document.getElementById(`vit-finput-${k}`).value = nv;
                        document.getElementById(`vit-bar-${k}`).style.width =
                            Math.max(0, Math.min(100, (nv / max) * 100)) + "%";
                    }),
                );
                document.querySelectorAll("[data-vit-heal]").forEach((el) =>
                    el.addEventListener("click", () => {
                        const k = el.dataset.vitHeal;
                        const cur =
                            parseInt(
                                document.getElementById(`vit-cur-${k}`)
                                    ?.textContent,
                            ) || 0;
                        const max =
                            parseInt(
                                document.getElementById(`vit-maxinput-${k}`)
                                    ?.value,
                            ) || 1;
                        const delta =
                            parseInt(
                                document.getElementById(`vit-delta-${k}`)
                                    ?.value,
                            ) || 1;
                        const nv = Math.min(max, cur + delta);
                        document.getElementById(`vit-cur-${k}`).textContent =
                            nv;
                        document.getElementById(`vit-finput-${k}`).value = nv;
                        document.getElementById(`vit-bar-${k}`).style.width =
                            Math.max(0, Math.min(100, (nv / max) * 100)) + "%";
                    }),
                );

                // FIELD BUILDER

                document
                    .getElementById("invite-btn")
                    ?.addEventListener("click", async () => {
                        const email = document
                            .getElementById("invite-email")
                            ?.value.trim()
                            .toLowerCase();
                        if (!email) return toast("Digite um email", "error");
                        try {
                            // Search user by email in users collection
                            const { db, collection, query, where, getDocs } =
                                window._fb;
                            const q = query(
                                collection(db, "users"),
                                where("email", "==", email),
                            );
                            const snap = await getDocs(q);
                            if (snap.empty)
                                return toast(
                                    "Usuário não encontrado. Peça para ele criar uma conta primeiro.",
                                    "error",
                                );
                            const userData = snap.docs[0].data();
                            const uid = snap.docs[0].id;
                            // Add to campaign members
                            const members = [
                                ...new Set([
                                    ...(S.currentCampaign.members || []),
                                    uid,
                                ]),
                            ];
                            const memberNames = [
                                ...(S.currentCampaign.memberNames || []),
                            ];
                            if (!memberNames.find((m) => m.uid === uid)) {
                                memberNames.push({
                                    uid,
                                    email,
                                    name: userData.name || email,
                                });
                            }
                            await saveCampaign(S.currentCampaign.id, {
                                members,
                                memberNames,
                            });
                            S.currentCampaign.members = members;
                            S.currentCampaign.memberNames = memberNames;
                            document.getElementById("invite-email").value = "";
                            document.getElementById("tab-content").innerHTML =
                                renderTabContent(
                                    "builder",
                                    S.editData || {},
                                    canMaster(),
                                    S.currentCampaign?.customFields ||
                                        DEFAULT_FIELDS,
                                    S.currentCampaign,
                                );
                            bindTabEvents();
                            toast(`${userData.name || email} adicionado!`);
                        } catch (e) {
                            toast("Erro: " + e.message, "error");
                        }
                    });
                document
                    .querySelectorAll("[data-remove-member]")
                    .forEach((el) =>
                        el.addEventListener("click", async () => {
                            const uid = el.dataset.removeMember;
                            S.currentCampaign.members = (
                                S.currentCampaign.members || []
                            ).filter((m) => m !== uid);
                            S.currentCampaign.memberNames = (
                                S.currentCampaign.memberNames || []
                            ).filter((m) => m.uid !== uid);
                            await saveCampaign(S.currentCampaign.id, {
                                members: S.currentCampaign.members,
                                memberNames: S.currentCampaign.memberNames,
                            });
                            document.getElementById("tab-content").innerHTML =
                                renderTabContent(
                                    "builder",
                                    S.editData || {},
                                    canMaster(),
                                    S.currentCampaign?.customFields ||
                                        DEFAULT_FIELDS,
                                    S.currentCampaign,
                                );
                            bindTabEvents();
                            toast("Membro removido");
                        }),
                    );
                // SKILLS MANAGEMENT
                document
                    .getElementById("add-skill-btn")
                    ?.addEventListener("click", () => {
                        const name = document
                            .getElementById("new-skill-name")
                            ?.value.trim();
                        if (!name)
                            return toast(
                                "Nome da perícia obrigatório",
                                "error",
                            );
                        const base =
                            parseInt(
                                document.getElementById("new-skill-base")
                                    ?.value,
                            ) || 0;
                        if (!S.currentCampaign.campaignSkills) {
                            S.currentCampaign.campaignSkills =
                                DEFAULT_SKILLS.map((n) => ({
                                    name: n,
                                    useProf: true,
                                    baseValue: 0,
                                    enabled: true,
                                }));
                        }
                        S.currentCampaign.campaignSkills.push({
                            name,
                            useProf: true,
                            baseValue: base,
                            enabled: true,

                            renderTabContent(
                                "builder",
                                S.editData || {},
                                canMaster(),
                                S.currentCampaign?.customFields ||
                                    DEFAULT_FIELDS,
                                S.currentCampaign,
                            );
                        bindTabEvents();
                        toast("Perícia adicionada!");
                    });
                document.querySelectorAll("[data-skill-toggle]").forEach((el) =>
                    el.addEventListener("change", () => {
                        if (!S.currentCampaign.campaignSkills) return;
                        S.currentCampaign.campaignSkills[
                            parseInt(el.dataset.skillToggle)
                        ].enabled = el.checked;
                    }),
                );
                document.querySelectorAll("[data-skill-base]").forEach((el) =>
                    el.addEventListener("input", () => {
                        if (!S.currentCampaign.campaignSkills) return;
                        S.currentCampaign.campaignSkills[
                            parseInt(el.dataset.skillBase)
                        ].baseValue = parseInt(el.value) || 0;
                    }),
                );
                document.querySelectorAll("[data-del-skill]").forEach((el) =>
                    el.addEventListener("click", () => {
                        if (!S.currentCampaign.campaignSkills) return;
                        S.currentCampaign.campaignSkills.splice(
                            parseInt(el.dataset.delSkill),
                            1,
                        );
                        document.getElementById("tab-content").innerHTML =
                            renderTabContent(
                                "builder",
                                S.editData || {},
                                canMaster(),
                                S.currentCampaign?.customFields ||
                                    DEFAULT_FIELDS,
                                S.currentCampaign,
                            );
                        bindTabEvents();
                    }),
                );
                // SKILL PROF TOGGLE (in sheet)
                document.querySelectorAll(".skill-prof-toggle").forEach((el) =>
                    el.addEventListener("click", () => {
                        const name = el.dataset.skillName;
                        if (!S.editData) S.editData = {};
                        if (!S.editData.skills) S.editData.skills = {};
                        const cur = S.editData.skills[name] || {};
                        cur.prof = !cur.prof;
                        S.editData.skills[name] = cur;
                        el.style.background = cur.prof
                            ? "var(--gold)"
                            : "transparent";
                        el.style.borderColor = cur.prof
                            ? "var(--gold)"
                            : "var(--border)";
                        el.style.color = cur.prof ? "var(--bg)" : "transparent";
                        const row = el.closest('div[style*="align-items"]');
                        if (row) {
                            const nameEl = row.querySelector("span");
                            if (nameEl)
                                nameEl.style.color = cur.prof
                                    ? "var(--gold)"
                                    : "var(--text)";
                            // recalc total
                            const c = S.currentCampaign;
                            const sk = (c?.campaignSkills || []).find(
                                (x) => x.name === name,
                            ) || { baseValue: 0 };
                            const bonus = cur.bonus || 0;
                            const total =
                                (sk.baseValue || 0) +
                                bonus +
                                (cur.prof
                                    ? S.editData.profBonus || s?.profBonus || 2
                                    : 0);
                            const totEl = row.querySelector("span:last-child");
                            if (totEl && totEl !== nameEl)
                                totEl.textContent =
                                    total >= 0 ? "+" + total : "" + total;
                        }
                    }),
                );
                document.querySelectorAll(".skill-bonus-input").forEach((el) =>
                    el.addEventListener("input", () => {
                        const name = el.dataset.skillName;
                        if (!S.editData) S.editData = {};
                        if (!S.editData.skills) S.editData.skills = {};
                        if (!S.editData.skills[name])
                            S.editData.skills[name] = {};
                        S.editData.skills[name].bonus = parseInt(el.value) || 0;
                    }),
                );
                document
                    .getElementById("add-field-btn")
                    ?.addEventListener("click", () => {
                        const label = document
                            .getElementById("new-field-label")
                            ?.value.trim();
                        if (!label)
                            return toast("Nome do campo obrigatório", "error");
                        const type =
                            document.getElementById("new-field-type")?.value ||
                            "text";
                        const color =
                            document.getElementById("new-field-color")?.value ||
                            "#c9a84c";
                        const key =
                            "custom_" +
                            label.toLowerCase().replace(/\s+/g, "_") +
                            "_" +
                            Date.now();
                        if (!S.currentCampaign.extraFields)
                            S.currentCampaign.extraFields = [];
                        S.currentCampaign.extraFields.push({
                            key,
                            label,
                            type,
                            color,
                            locked: false,
                        });
                        document.getElementById("tab-content").innerHTML =
                            renderTabContent(
                                "builder",
                                S.editData || {},
                                canMaster(),
                                S.currentCampaign?.customFields ||
                                    DEFAULT_FIELDS,
                                S.currentCampaign,
                            );
                        bindTabEvents();
                        toast("Campo adicionado!");
                    });
                document.querySelectorAll("[data-del-field]").forEach((el) =>
                    el.addEventListener("click", () => {
                        S.currentCampaign.extraFields.splice(
                            parseInt(el.dataset.delField),
                            1,
                        );
                        document.getElementById("tab-content").innerHTML =
                            renderTabContent(
                                "builder",
                                S.editData || {},
                                true,
                                S.currentCampaign?.customFields ||
                                    DEFAULT_FIELDS,
                                S.currentCampaign,
                            );
                        bindTabEvents();
                    }),
                );
                document.querySelectorAll("[data-toggle-lock]").forEach((el) =>
                    el.addEventListener("click", () => {
                        const f =
                            S.currentCampaign.extraFields[
                                parseInt(el.dataset.toggleLock)
                            ];
                        if (!f) return;
                        f.locked = !f.locked;
                        el.textContent = f.locked ? "🔒" : "🔓";
                        el.className =
                            "field-def-locked " + (f.locked ? "on" : "off");
                    }),
                );
                document
                    .getElementById("save-campaign-config")
                    ?.addEventListener("click", async () => {
                        await saveCampaign(S.currentCampaign.id, {
                            extraFields: S.currentCampaign.extraFields || [],
                            statLocks: S.currentCampaign.statLocks || {},
                            useSanity:
                                document.getElementById("toggle-sanity")
                                    ?.checked || false,
                            useBaseStats:
                                document.getElementById("toggle-basestats")
                                    ?.checked !== false,
                            campaignSkills:
                                S.currentCampaign.campaignSkills ||
                                DEFAULT_SKILLS.map((n) => ({
                                    name: n,
                                    useProf: true,
                                    baseValue: 0,
                                    enabled: true,
                                })),
                        });
                        await loadCampaigns();
                        S.currentCampaign = S.campaigns.find(
                            (x) => x.id === S.currentCampaign.id,
                        );
                        toast("Configurações salvas!");
                    });
                document
                    .getElementById("inv-add-btn")
                    ?.addEventListener("click", () => {
                        const name = document
                            .getElementById("inv-name-input")
                            ?.value.trim();
                        if (!name)
                            return toast("Nome do item obrigatório", "error");
                        const desc =
                            document.getElementById("inv-desc-input")?.value ||
                            "";
                        if (!S.editData) S.editData = {};
                        S.editData.inventory = [
                            ...(S.editData.inventory || []),
                            { name, desc, qty: 1 },
                        ];
                        document.getElementById("inv-name-input").value = "";
                        document.getElementById("inv-desc-input").value = "";
                        document.getElementById("tab-content").innerHTML =
                            renderTabContent(
                                "inventory",
                                S.editData,
                                canMaster(),
                                S.currentCampaign?.customFields ||
                                    DEFAULT_FIELDS,
                                S.currentCampaign,
                            );
                        bindTabEvents();
                    });
                document.querySelectorAll("[data-inv-del]").forEach((el) =>
                    el.addEventListener("click", () => {
                        if (!S.editData?.inventory) return;
                        S.editData.inventory.splice(
                            parseInt(el.dataset.invDel),
                            1,
                        );
                        document.getElementById("tab-content").innerHTML =
                            renderTabContent(
                                "inventory",
                                S.editData,
                                canMaster(),
                                S.currentCampaign?.customFields ||
                                    DEFAULT_FIELDS,
                                S.currentCampaign,
                            );
                        bindTabEvents();
                    }),
                );
                document
                    .getElementById("spell-add-btn")
                    ?.addEventListener("click", () => {
                        const name = document
                            .getElementById("spell-name-input")
                            ?.value.trim();
                        if (!name) return toast("Nome obrigatório", "error");
                        const desc =
                            document.getElementById("spell-desc-input")
                                ?.value || "";
                        const level =
                            parseInt(
                                document.getElementById("spell-level-input")
                                    ?.value,
                            ) || 0;
                        if (!S.editData) S.editData = {};
                        S.editData.spells = [
                            ...(S.editData.spells || []),
                            { name, desc, level },
                        ];
                        document.getElementById("spell-name-input").value = "";
                        document.getElementById("spell-desc-input").value = "";
                        document.getElementById("tab-content").innerHTML =
                            renderTabContent(
                                "spells",
                                S.editData,
                                canMaster(),
                                S.currentCampaign?.customFields ||
                                    DEFAULT_FIELDS,
                                S.currentCampaign,
                            );
                        bindTabEvents();
                    });
                document.querySelectorAll("[data-spell-del]").forEach((el) =>
                    el.addEventListener("click", () => {
                        if (!S.editData?.spells) return;
                        S.editData.spells.splice(
                            parseInt(el.dataset.spellDel),
                            1,
                        );
                        document.getElementById("tab-content").innerHTML =
                            renderTabContent(
                                "spells",
                                S.editData,
                                canMaster(),
                                S.currentCampaign?.customFields ||
                                    DEFAULT_FIELDS,
                                S.currentCampaign,
                            );
                        bindTabEvents();
                    }),
                );
            }
        </script>
    </body>
</html>
