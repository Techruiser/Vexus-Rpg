<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vexus RPG</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"
            rel="stylesheet"
        />
        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
            import {
                getAuth,
                createUserWithEmailAndPassword,
                signInWithEmailAndPassword,
                signOut,
                onAuthStateChanged,
                updateProfile,
            } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
            import {
                getFirestore,
                doc,
                setDoc,
                getDoc,
                collection,
                addDoc,
                getDocs,
                updateDoc,
                deleteDoc,
                onSnapshot,
                query,
                where,
                serverTimestamp,
            } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
            import {
                getStorage,
                ref,
                uploadBytes,
                getDownloadURL,
            } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

            // For Firebase JS SDK v7.20.0 and later, measurementId is optional
            const firebaseConfig = {
                apiKey: "AIzaSyBmeBpajwsmbpHMg1xciLzvmg7qhyeXuxc",
                authDomain: "rpg-codex-f5dab.firebaseapp.com",
                projectId: "rpg-codex-f5dab",
                storageBucket: "rpg-codex-f5dab.firebasestorage.app",
                messagingSenderId: "847219936470",
                appId: "1:847219936470:web:74c8237ba67f79cb3d0d77",
                measurementId: "G-5DWSDH621L",
            };
            const ADMIN_EMAIL = "luizhenriquecs06@gmail.com";

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const storage = getStorage(app);
            window._fb = {
                auth,
                db,
                storage,
                createUserWithEmailAndPassword,
                signInWithEmailAndPassword,
                signOut,
                onAuthStateChanged,
                updateProfile,
                doc,
                setDoc,
                getDoc,
                collection,
                addDoc,
                getDocs,
                updateDoc,
                deleteDoc,
                onSnapshot,
                query,
                where,
                serverTimestamp,
                ADMIN_EMAIL,
            };

            onAuthStateChanged(auth, async (user) => {
                window._pendingUser = user;
                window._pendingEmail = user ? user.email : null;
                window._authFired = true;
                if (typeof window._onAuthCallback === "function")
                    window._onAuthCallback(user);
            });
        </script>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0c0a08;
                --bg2: #131109;
                --bg3: #1c1810;
                --card: #1a1610;
                --border: #3a3020;
                --gold: #c9a84c;
                --gold2: #e8c96a;
                --gold-dim: #7a6030;
                --red: #c0392b;
                --red2: #e74c3c;
                --blue: #3498db;
                --green: #27ae60;
                --purple: #9b59b6;
                --text: #e8dfc8;
                --text2: #a09070;
                --text3: #5a5040;
                --shadow: rgba(0, 0, 0, 0.7);
                --glow: rgba(201, 168, 76, 0.15);
            }
            html,
            body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: "Crimson Pro", serif;
                font-size: 16px;
            }
            ::-webkit-scrollbar {
                width: 6px;
            }
            ::-webkit-scrollbar-track {
                background: var(--bg2);
            }
            ::-webkit-scrollbar-thumb {
                background: var(--gold-dim);
                border-radius: 3px;
            }
            h1,
            h2,
            h3,
            h4 {
                font-family: "Cinzel", serif;
                letter-spacing: 0.05em;
            }
            #app {
                position: relative;
                z-index: 1;
                min-height: 100vh;
            }

            /* BUTTONS */
            .btn {
                font-family: "Cinzel", serif;
                font-size: 12px;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                padding: 10px 24px;
                border: 1px solid var(--gold-dim);
                background: transparent;
                color: var(--gold);
                cursor: pointer;
                transition: all 0.2s;
                position: relative;
                overflow: hidden;
            }
            .btn::before {
                content: "";
                position: absolute;
                inset: 0;
                background: var(--gold);
                opacity: 0;
                transition: opacity 0.2s;
            }
            .btn:hover {
                color: var(--bg);
                border-color: var(--gold);
            }
            .btn:hover::before {
                opacity: 1;
            }
            .btn span {
                position: relative;
                z-index: 1;
            }
            .btn-solid {
                background: var(--gold);
                color: var(--bg);
                border-color: var(--gold);
            }
            .btn-solid::before {
                background: var(--gold2);
            }
            .btn-solid:hover {
                color: var(--bg);
            }
            .btn-danger {
                border-color: var(--red);
                color: var(--red2);
            }
            .btn-danger::before {
                background: var(--red);
            }
            .btn-danger:hover {
                color: #fff;
            }
            .btn-blue {
                border-color: var(--blue);
                color: var(--blue);
            }
            .btn-blue::before {
                background: var(--blue);
            }
            .btn-blue:hover {
                color: #fff;
            }
            .btn-green {
                border-color: var(--green);
                color: var(--green);
            }
            .btn-green::before {
                background: var(--green);
            }
            .btn-green:hover {
                color: #fff;
            }
            .btn-sm {
                padding: 6px 14px;
                font-size: 11px;
            }
            .btn-xs {
                padding: 4px 10px;
                font-size: 10px;
            }

            /* INPUTS */
            .field {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .field label {
                font-family: "Cinzel", serif;
                font-size: 11px;
                letter-spacing: 0.1em;
                color: var(--gold-dim);
                text-transform: uppercase;
            }
            .field input,
            .field textarea,
            .field select {
                background: var(--bg2);
                border: 1px solid var(--border);
                color: var(--text);
                padding: 10px 14px;
                font-family: "Crimson Pro", serif;
                font-size: 15px;
                outline: none;
                transition: border-color 0.2s;
                width: 100%;
            }
            .field input:focus,
            .field textarea:focus,
            .field select:focus {
                border-color: var(--gold-dim);
            }
            .field select option {
                background: var(--bg2);
            }
            .field input:disabled,
            .field textarea:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            /* CARDS */
            .card {
                background: var(--card);
                border: 1px solid var(--border);
                position: relative;
                overflow: hidden;
            }
            .card::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 1px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    var(--gold-dim),
                    transparent
                );
            }

            /* TOAST */
            #toast {
                position: fixed;
                bottom: 32px;
                right: 32px;
                z-index: 9999;
                font-family: "Cinzel", serif;
                font-size: 12px;
                letter-spacing: 0.08em;
                padding: 12px 24px;
                border-left: 3px solid var(--gold);
                background: var(--bg3);
                color: var(--gold);
                transform: translateX(200%);
                transition: transform 0.3s;
                max-width: 320px;
            }
            #toast.show {
                transform: translateX(0);
            }
            #toast.error {
                border-color: var(--red2);
                color: var(--red2);
            }

            /* LOADING */
            .loading {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                flex-direction: column;
                gap: 16px;
            }
            .loading-rune {
                font-size: 48px;
                animation: spin 3s linear infinite;
                filter: drop-shadow(0 0 16px var(--gold));
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .loading p {
                font-family: "Cinzel", serif;
                font-size: 14px;
                letter-spacing: 0.15em;
                color: var(--gold-dim);
            }

            /* LOGIN */
            #login-page {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px;
            }
            .login-box {
                width: 100%;
                max-width: 420px;
                padding: 48px;
                background: var(--card);
                border: 1px solid var(--border);
                box-shadow: 0 0 80px var(--glow);
            }
            .login-crest {
                text-align: center;
                margin-bottom: 32px;
            }
            .login-crest .crest-icon {
                font-size: 48px;
                filter: drop-shadow(0 0 16px var(--gold));
            }
            .login-crest h1 {
                font-size: 28px;
                color: var(--gold);
                margin-top: 12px;
            }
            .login-crest p {
                color: var(--text2);
                font-style: italic;
                font-size: 14px;
                margin-top: 4px;
            }
            .login-tabs {
                display: flex;
                margin-bottom: 28px;
            }
            .login-tab {
                flex: 1;
                padding: 10px;
                text-align: center;
                cursor: pointer;
                font-family: "Cinzel", serif;
                font-size: 12px;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--text2);
                border-bottom: 2px solid var(--border);
                transition: all 0.2s;
            }
            .login-tab.active {
                color: var(--gold);
                border-color: var(--gold);
            }
            .login-form {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            /* LAYOUT */
            #main-page {
                display: flex;
                min-height: 100vh;
            }
            .sidebar {
                width: 240px;
                flex-shrink: 0;
                background: var(--bg2);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 100;
            }
            .sidebar-header {
                padding: 24px 20px;
                border-bottom: 1px solid var(--border);
                text-align: center;
            }
            .sidebar-header .logo-icon {
                font-size: 28px;
                filter: drop-shadow(0 0 8px var(--gold));
            }
            .sidebar-header h2 {
                font-size: 16px;
                color: var(--gold);
                margin-top: 8px;
            }
            .sidebar-header .user-info {
                font-size: 12px;
                color: var(--text2);
                margin-top: 4px;
            }
            .admin-badge {
                display: inline-block;
                margin-top: 6px;
                font-family: "Cinzel", serif;
                font-size: 9px;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                padding: 2px 8px;
                border: 1px solid var(--gold);
                color: var(--gold);
            }
            .master-badge {
                display: inline-block;
                margin-top: 6px;
                font-family: "Cinzel", serif;
                font-size: 9px;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                padding: 2px 8px;
                border: 1px solid var(--blue);
                color: var(--blue);
            }
            .sidebar-nav {
                flex: 1;
                padding: 16px 0;
                overflow-y: auto;
            }
            .nav-section {
                padding: 8px 20px;
            }
            .nav-label {
                font-family: "Cinzel", serif;
                font-size: 9px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--text3);
                margin-bottom: 8px;
            }
            .nav-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 9px 12px;
                color: var(--text2);
                cursor: pointer;
                font-size: 14px;
                transition: all 0.15s;
                border-left: 2px solid transparent;
                margin-bottom: 2px;
            }
            .nav-item:hover {
                color: var(--text);
                background: var(--bg3);
            }
            .nav-item.active {
                color: var(--gold);
                border-color: var(--gold);
                background: rgba(201, 168, 76, 0.06);
            }
            .nav-item .icon {
                font-size: 16px;
                width: 20px;
                text-align: center;
            }
            .sidebar-footer {
                padding: 16px 20px;
                border-top: 1px solid var(--border);
            }
            .content {
                margin-left: 240px;
                flex: 1;
                padding: 40px;
                min-height: 100vh;
            }
            .page-header {
                margin-bottom: 36px;
            }
            .page-header h1 {
                font-size: 28px;
                color: var(--gold);
            }
            .page-header p {
                color: var(--text2);
                font-style: italic;
                margin-top: 6px;
            }
            .back-btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-family: "Cinzel", serif;
                font-size: 11px;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--text2);
                cursor: pointer;
                margin-bottom: 24px;
                transition: color 0.15s;
            }
            .back-btn:hover {
                color: var(--gold);
            }
            .section-title {
                font-family: "Cinzel", serif;
                font-size: 12px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--gold-dim);
                margin-bottom: 16px;
                padding-bottom: 8px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .divider {
                display: flex;
                align-items: center;
                gap: 12px;
                color: var(--gold-dim);
                font-size: 11px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                margin: 24px 0;
            }
            .divider::before,
            .divider::after {
                content: "";
                flex: 1;
                height: 1px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    var(--gold-dim)
                );
            }
            .divider::after {
                transform: scaleX(-1);
            }
            .empty {
                text-align: center;
                padding: 64px 32px;
                color: var(--text3);
                font-style: italic;
            }
            .empty .empty-icon {
                font-size: 48px;
                margin-bottom: 16px;
                opacity: 0.4;
            }

            /* MODAL */
            .modal-overlay {
                position: fixed;
                inset: 0;
                z-index: 500;
                background: rgba(0, 0, 0, 0.75);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s;
            }
            .modal-overlay.open {
                opacity: 1;
                pointer-events: all;
            }
            .modal {
                background: var(--bg2);
                border: 1px solid var(--border);
                width: 100%;
                max-width: 560px;
                max-height: 85vh;
                overflow-y: auto;
                padding: 32px;
                position: relative;
                box-shadow:
                    0 24px 80px rgba(0, 0, 0, 0.8),
                    0 0 40px var(--glow);
                transform: translateY(20px);
                transition: transform 0.2s;
            }
            .modal-overlay.open .modal {
                transform: translateY(0);
            }
            .modal h3 {
                font-size: 18px;
                color: var(--gold);
                margin-bottom: 24px;
            }
            .modal-actions {
                display: flex;
                gap: 12px;
                justify-content: flex-end;
                margin-top: 24px;
            }
            .modal-close {
                position: absolute;
                top: 16px;
                right: 16px;
                background: none;
                border: none;
                color: var(--text2);
                cursor: pointer;
                font-size: 20px;
                transition: color 0.2s;
            }
            .modal-close:hover {
                color: var(--text);
            }
            .modal-form {
                display: flex;
                flex-direction: column;
                gap: 14px;
            }

            /* CAMPAIGNS */
            .campaigns-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 20px;
            }
            .campaign-card {
                background: var(--card);
                border: 1px solid var(--border);
                cursor: pointer;
                transition: all 0.2s;
                overflow: hidden;
                position: relative;
            }
            .campaign-card:hover {
                border-color: var(--gold-dim);
                transform: translateY(-2px);
                box-shadow: 0 8px 32px var(--shadow);
            }
            .campaign-cover {
                height: 120px;
                background: linear-gradient(135deg, #1a1208, #2a1f0a);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 48px;
                position: relative;
                overflow: hidden;
            }
            .campaign-cover img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                position: absolute;
                inset: 0;
            }
            .campaign-cover-icon {
                position: relative;
                z-index: 1;
                filter: drop-shadow(0 0 12px var(--gold));
            }
            .campaign-body {
                padding: 20px;
            }
            .campaign-body h3 {
                font-size: 16px;
                color: var(--gold2);
                margin-bottom: 6px;
            }
            .campaign-body p {
                font-size: 13px;
                color: var(--text2);
                font-style: italic;
                line-height: 1.5;
            }
            .campaign-meta {
                display: flex;
                gap: 16px;
                margin-top: 14px;
                font-size: 12px;
                color: var(--text3);
            }
            .add-campaign-card {
                border: 1px dashed var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                gap: 12px;
                min-height: 200px;
                cursor: pointer;
                transition: all 0.2s;
                color: var(--text3);
            }
            .add-campaign-card:hover {
                border-color: var(--gold-dim);
                color: var(--gold-dim);
            }

            /* SHEETS */
            .campaign-banner {
                height: 180px;
                background: linear-gradient(135deg, #1a1208, #2a1f0a);
                display: flex;
                align-items: flex-end;
                position: relative;
                overflow: hidden;
                margin-bottom: 32px;
                border: 1px solid var(--border);
            }
            .campaign-banner img {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                opacity: 0.5;
            }
            .campaign-banner-overlay {
                position: relative;
                z-index: 1;
                padding: 24px;
                width: 100%;
                background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            }
            .campaign-banner h2 {
                font-size: 24px;
                color: var(--gold);
            }
            .sheets-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 16px;
            }
            .sheet-card {
                background: var(--card);
                border: 1px solid var(--border);
                overflow: hidden;
                position: relative;
            }
            .sheet-card-body {
                cursor: pointer;
                transition: all 0.2s;
            }
            .sheet-card-body:hover {
                border-color: var(--gold-dim);
            }
            .sheet-avatar {
                height: 90px;
                background: linear-gradient(135deg, #150e05, #231a08);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 36px;
                position: relative;
                overflow: hidden;
            }
            .sheet-avatar img {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .sheet-avatar-icon {
                position: relative;
                z-index: 1;
            }
            .sheet-info {
                padding: 12px;
            }
            .sheet-info h4 {
                font-size: 14px;
                color: var(--gold2);
            }
            .sheet-info .sub {
                font-size: 12px;
                color: var(--text2);
                margin-top: 3px;
                font-style: italic;
            }
            .sheet-actions {
                display: flex;
                gap: 6px;
                padding: 8px 12px;
                border-top: 1px solid var(--border);
                background: var(--bg3);
            }

            /* HP / SANITY BARS */
            .bar-wrap {
                margin-top: 8px;
            }
            .bar-label {
                display: flex;
                justify-content: space-between;
                font-size: 10px;
                color: var(--text3);
                margin-bottom: 3px;
                font-family: "Cinzel", serif;
            }
            .bar-track {
                height: 5px;
                background: var(--bg3);
                overflow: hidden;
            }
            .bar-fill {
                height: 100%;
                transition: width 0.4s ease;
            }
            .bar-hp {
                background: linear-gradient(90deg, var(--red), var(--red2));
            }
            .bar-san {
                background: linear-gradient(90deg, #1a6b8a, #3498db);
            }

            /* SHEET EDITOR */
            .sheet-editor {
                max-width: 960px;
            }
            .sheet-top {
                display: grid;
                grid-template-columns: 130px 1fr;
                gap: 24px;
                align-items: start;
                margin-bottom: 28px;
            }
            .portrait-wrap {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            .sheet-portrait {
                width: 130px;
                height: 170px;
                background: var(--bg3);
                border: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 44px;
                cursor: pointer;
                position: relative;
                overflow: hidden;
                transition: border-color 0.2s;
            }
            .sheet-portrait:hover {
                border-color: var(--gold-dim);
            }
            .sheet-portrait img {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .sheet-portrait .upload-hint {
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Cinzel", serif;
                font-size: 10px;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--gold-dim);
                opacity: 0;
                transition: opacity 0.2s;
            }
            .sheet-portrait:hover .upload-hint {
                opacity: 1;
            }
            .core-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .core-grid .full {
                grid-column: 1/-1;
            }

            /* STATS */
            .stats-row {
                display: grid;
                grid-template-columns: repeat(6, 1fr);
                gap: 8px;
                margin-bottom: 20px;
            }
            .stat-box {
                background: var(--bg3);
                border: 1px solid var(--border);
                padding: 10px 4px;
                text-align: center;
                position: relative;
            }
            .stat-box label {
                font-family: "Cinzel", serif;
                font-size: 9px;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--text3);
                display: block;
                margin-bottom: 4px;
            }
            .stat-box input {
                width: 100%;
                background: transparent;
                border: none;
                border-bottom: 1px solid var(--border);
                color: var(--gold);
                font-family: "Cinzel", serif;
                font-size: 20px;
                text-align: center;
                outline: none;
                padding: 2px 0;
            }
            .stat-box input:disabled {
                color: var(--text3);
                cursor: not-allowed;
            }
            .stat-mod {
                font-size: 11px;
                color: var(--text2);
                margin-top: 3px;
            }
            .lock-icon {
                position: absolute;
                top: 4px;
                right: 4px;
                font-size: 10px;
                color: var(--text3);
                cursor: pointer;
            }
            .lock-icon.locked {
                color: var(--red2);
            }

            /* VITAL BARS SECTION */
            .vitals-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
                margin-bottom: 20px;
            }
            .vital-box {
                background: var(--bg3);
                border: 1px solid var(--border);
                padding: 16px;
            }
            .vital-box .vital-title {
                font-family: "Cinzel", serif;
                font-size: 11px;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                color: var(--text3);
                text-align: center;
                margin-bottom: 10px;
            }
            .vital-numbers {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                margin-bottom: 8px;
            }
            .vital-cur {
                font-family: "Cinzel", serif;
                font-size: 28px;
            }
            .vital-cur.hp {
                color: var(--red2);
            }
            .vital-cur.san {
                color: #3498db;
            }
            .vital-sep {
                color: var(--text3);
                font-size: 20px;
            }
            .vital-max {
                font-family: "Cinzel", serif;
                font-size: 20px;
                color: var(--text2);
            }
            .vital-controls {
                display: flex;
                gap: 6px;
                justify-content: center;
                align-items: center;
                margin-top: 8px;
            }
            .vital-controls input {
                width: 50px;
                background: var(--bg2);
                border: 1px solid var(--border);
                color: var(--text);
                text-align: center;
                font-size: 14px;
                padding: 4px;
                font-family: "Crimson Pro", serif;
                outline: none;
            }

            /* INVENTORY */
            .inventory-list {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-bottom: 12px;
            }
            .inv-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 12px;
                background: var(--bg3);
                border: 1px solid var(--border);
            }
            .inv-item .inv-name {
                flex: 1;
                font-size: 14px;
            }
            .inv-item .inv-qty {
                width: 40px;
                background: transparent;
                border: none;
                border-bottom: 1px solid var(--border);
                color: var(--gold);
                text-align: center;
                font-family: "Cinzel", serif;
                outline: none;
                font-size: 13px;
            }
            .inv-item .inv-del {
                background: none;
                border: none;
                color: var(--text3);
                cursor: pointer;
                font-size: 16px;
                transition: color 0.15s;
            }
            .inv-item .inv-del:hover {
                color: var(--red2);
            }

            /* SPELLS */
            .spell-list {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-bottom: 12px;
            }
            .spell-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 12px;
                background: var(--bg3);
                border: 1px solid var(--border);
            }
            .spell-item .spell-name {
                flex: 1;
                font-size: 14px;
            }
            .spell-item .spell-level {
                width: 30px;
                background: transparent;
                border: none;
                border-bottom: 1px solid var(--border);
                color: var(--purple);
                text-align: center;
                font-family: "Cinzel", serif;
                outline: none;
                font-size: 13px;
            }
            .spell-item .spell-del {
                background: none;
                border: none;
                color: var(--text3);
                cursor: pointer;
                font-size: 16px;
                transition: color 0.15s;
            }
            .spell-item .spell-del:hover {
                color: var(--red2);
            }

            /* CURRENCY */
            .currency-grid {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 8px;
                margin-bottom: 20px;
            }
            .coin-box {
                background: var(--bg3);
                border: 1px solid var(--border);
                padding: 10px 6px;
                text-align: center;
            }
            .coin-box label {
                font-family: "Cinzel", serif;
                font-size: 9px;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                display: block;
                margin-bottom: 6px;
            }
            .coin-box.pp label {
                color: #b0b0c0;
            }
            .coin-box.gp label {
                color: var(--gold);
            }
            .coin-box.ep label {
                color: #a0c0a0;
            }
            .coin-box.sp label {
                color: #c0c0c0;
            }
            .coin-box.cp label {
                color: #c07050;
            }
            .coin-box input {
                width: 100%;
                background: transparent;
                border: none;
                border-bottom: 1px solid var(--border);
                color: var(--text);
                font-family: "Cinzel", serif;
                font-size: 18px;
                text-align: center;
                outline: none;
                padding: 2px 0;
            }

            /* CUSTOM FIELDS */
            .custom-field-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 12px;
                background: var(--bg3);
                border: 1px solid var(--border);
                margin-bottom: 6px;
            }
            .custom-field-label {
                font-family: "Cinzel", serif;
                font-size: 10px;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--gold-dim);
                min-width: 100px;
            }
            .custom-field-value {
                flex: 1;
                background: transparent;
                border: none;
                border-bottom: 1px solid var(--border);
                color: var(--text);
                font-family: "Crimson Pro", serif;
                font-size: 14px;
                outline: none;
                padding: 2px 4px;
            }
            .custom-field-value:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            .custom-field-actions {
                display: flex;
                gap: 4px;
            }

            /* SKILLS */
            .skills-grid {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 4px;
                margin-bottom: 20px;
            }
            .skill-row {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 5px 8px;
                font-size: 13px;
                color: var(--text2);
                cursor: pointer;
                transition: all 0.15s;
                border: 1px solid transparent;
            }
            .skill-row:hover {
                border-color: var(--border);
                color: var(--text);
            }
            .skill-row.prof {
                color: var(--gold);
            }
            .skill-dot {
                width: 12px;
                height: 12px;
                border: 1px solid var(--border);
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 8px;
            }
            .skill-row.prof .skill-dot {
                border-color: var(--gold);
                background: var(--gold);
                color: var(--bg);
            }

            /* FIELD BUILDER (master) */
            .field-builder {
                background: var(--bg3);
                border: 1px solid var(--border);
                padding: 20px;
                margin-bottom: 20px;
            }
            .field-builder h4 {
                font-family: "Cinzel", serif;
                font-size: 13px;
                color: var(--gold-dim);
                margin-bottom: 16px;
                letter-spacing: 0.1em;
            }
            .field-type-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                margin-bottom: 16px;
            }
            .field-type-btn {
                padding: 8px;
                border: 1px solid var(--border);
                background: var(--bg2);
                color: var(--text2);
                cursor: pointer;
                font-family: "Cinzel", serif;
                font-size: 10px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                text-align: center;
                transition: all 0.2s;
            }
            .field-type-btn:hover,
            .field-type-btn.selected {
                border-color: var(--gold);
                color: var(--gold);
                background: rgba(201, 168, 76, 0.08);
            }
            .existing-fields {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .field-def-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 12px;
                background: var(--bg2);
                border: 1px solid var(--border);
            }
            .field-def-name {
                flex: 1;
                font-size: 13px;
                color: var(--text);
            }
            .field-def-type {
                font-size: 11px;
                color: var(--text3);
                font-family: "Cinzel", serif;
                letter-spacing: 0.08em;
            }
            .field-def-locked {
                font-size: 14px;
                cursor: pointer;
                transition: color 0.15s;
            }
            .field-def-locked.on {
                color: var(--red2);
            }
            .field-def-locked.off {
                color: var(--text3);
            }

            .sheet-menu-item:hover {
                background: var(--bg3);
                color: var(--gold) !important;
            }

            /* NOTES */
            .notes-area textarea {
                width: 100%;
                min-height: 100px;
                resize: vertical;
                background: var(--bg2);
                border: 1px solid var(--border);
                color: var(--text);
                font-family: "Crimson Pro", serif;
                font-size: 15px;
                padding: 12px;
                outline: none;
                line-height: 1.6;
            }
            .notes-area textarea:focus {
                border-color: var(--gold-dim);
            }
            .notes-area textarea:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            /* TABS */
            .tabs {
                display: flex;
                gap: 0;
                border-bottom: 1px solid var(--border);
                margin-bottom: 24px;
                overflow-x: auto;
            }
            .tab {
                padding: 10px 20px;
                font-family: "Cinzel", serif;
                font-size: 11px;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--text2);
                cursor: pointer;
                border-bottom: 2px solid transparent;
                margin-bottom: -1px;
                white-space: nowrap;
                transition: all 0.2s;
            }
            .tab:hover {
                color: var(--text);
            }
            .tab.active {
                color: var(--gold);
                border-color: var(--gold);
            }
        </style>
    </head>
    <body>
        <div id="app">
            <div class="loading" id="loading-screen">
                <div class="loading-rune">⚜</div>
                <p>Conjurando o Vexus...</p>
            </div>
        </div>
        <div id="toast"></div>
        <input
            type="file"
            id="img-upload"
            accept="image/*"
            style="display: none"
        />

        <script>
            // ═══════════════════════════════════════
            // STATE
            // ═══════════════════════════════════════
            let S = {
                user: null,
                isAdmin: false,
                isMaster: false,
                view: "campaigns",
                adminTab: "campaigns",
                adminUsers: [],
                adminLogs: [],
                campaigns: [],
                currentCampaign: null,
                sheets: [],
                currentSheet: null,
                activeTab: "basics",
                // for sheet editor
                editData: null,
            };

            // ═══════════════════════════════════════
            // HELPERS
            // ═══════════════════════════════════════
            let toastT;
            function toast(msg, type = "ok") {
                const el = document.getElementById("toast");
                el.textContent = msg;
                el.className = type === "error" ? "error show" : "show";
                clearTimeout(toastT);
                toastT = setTimeout(() => (el.className = ""), 3000);
            }

            function canMaster() {
                return S.isAdmin || S.isMaster;
            }

            function addLog(icon, msg) {
                const time = new Date().toLocaleString("pt-BR", {
                    day: "2-digit",
                    month: "2-digit",
                    hour: "2-digit",
                    minute: "2-digit",
                });
                S.adminLogs.unshift({ icon, msg, time });
                if (S.adminLogs.length > 50) S.adminLogs.pop();
            }

            function waitForFB(cb) {
                if (window._fb) return cb();
                setTimeout(() => waitForFB(cb), 100);
            }

            // ═══════════════════════════════════════
            // INIT
            // ═══════════════════════════════════════
            async function handleAuth(user) {
                const { ADMIN_EMAIL } = window._fb;
                const loading = document.getElementById("loading-screen");
                if (user) {
                    S.user = user;
                    S.isAdmin = user.email === ADMIN_EMAIL;
                    await loadCampaigns();
                    if (loading) loading.remove();
                    render();
                } else {
                    S.user = null;
                    if (loading) loading.remove();
                    renderLogin();
                }
            }

            // If Firebase already fired auth before this script ran
            if (window._authFired) {
                handleAuth(window._pendingUser);
            } else {
                window._onAuthCallback = handleAuth;
            }

            // ═══════════════════════════════════════
            // FIRESTORE
            // ═══════════════════════════════════════
            async function loadCampaigns() {
                const { db, collection, getDocs, query, where } = window._fb;
                const col = collection(db, "campaigns");
                const snap = await getDocs(col);
                S.campaigns = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
                if (!S.isAdmin) {
                    S.campaigns = S.campaigns.filter(
                        (c) =>
                            (c.members || []).includes(S.user.uid) ||
                            c.masterUid === S.user.uid,
                    );
                }
            }

            async function loadSheets(campaignId) {
                const { db, collection, getDocs } = window._fb;
                const snap = await getDocs(
                    collection(db, `campaigns/${campaignId}/sheets`),
                );
                const all = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
                const isMaster =
                    S.isAdmin || S.currentCampaign?.masterUid === S.user?.uid;
                // Players only see their own sheet or unassigned sheets
                S.sheets = isMaster
                    ? all
                    : all.filter(
                          (s) => !s.playerUid || s.playerUid === S.user?.uid,
                      );
            }

            async function saveCampaign(id, data) {
                const { db, doc, setDoc, serverTimestamp, collection, addDoc } =
                    window._fb;
                if (id) {
                    await setDoc(doc(db, "campaigns", id), data, {
                        merge: true,
                    });
                } else {
                    const ref = await addDoc(collection(db, "campaigns"), {
                        ...data,
                        createdBy: S.user.uid,
                        members: [S.user.uid],
                        createdAt: serverTimestamp(),
                    });
                    return ref.id;
                }
            }

            async function saveSheet(campaignId, sheetId, data) {
                const { db, doc, setDoc, serverTimestamp } = window._fb;
                const id = sheetId || crypto.randomUUID();
                await setDoc(
                    doc(db, `campaigns/${campaignId}/sheets`, id),
                    { ...data, updatedAt: serverTimestamp() },
                    { merge: true },
                );
                return id;
            }

            async function deleteSheet(campaignId, sheetId) {
                const { db, doc, deleteDoc } = window._fb;
                await deleteDoc(
                    doc(db, `campaigns/${campaignId}/sheets`, sheetId),
                );
            }

            async function uploadImage(file) {
                // Check file size (max 5MB)
                if(file.size > 5 * 1024 * 1024) throw new Error('Imagem muito grande (máx 5MB)');
                const {
                    storage,
                    ref: sref,
                    uploadBytes,
                    getDownloadURL,
                } = window._fb;
                const r = sref(
                    storage,
                    `images/${S.user.uid}/${Date.now()}_${file.name}`,
                );
                await uploadBytes(r, file);
                return await getDownloadURL(r);
            }

            // ═══════════════════════════════════════
            // AUTH
            // ═══════════════════════════════════════
            async function doLogin(email, pass) {
                const { auth, signInWithEmailAndPassword } = window._fb;
                await signInWithEmailAndPassword(auth, email, pass);
            }
            async function doRegister(email, pass, name) {
                const {
                    auth,
                    createUserWithEmailAndPassword,
                    updateProfile,
                    db,
                    doc,
                    setDoc,
                } = window._fb;
                const c = await createUserWithEmailAndPassword(
                    auth,
                    email,
                    pass,
                );
                await updateProfile(c.user, { displayName: name });
                await setDoc(doc(db, "users", c.user.uid), {
                    name,
                    email,
                    role: "player",
                });
            }
            async function doLogout() {
                await window._fb.signOut(window._fb.auth);
                renderLogin();
            }

            // ═══════════════════════════════════════
            // RENDER SYSTEM
            // ═══════════════════════════════════════
            function render() {
                let html = `<div id="main-page">${renderSidebar()}<div class="content" id="content"></div></div>`;
                document.getElementById("app").innerHTML = html;
                document.getElementById("content").innerHTML = renderContent();
                bindEvents();
            }

            function renderSidebar() {
                const u = S.user;
                const isMasterOfCurrent =
                    S.currentCampaign && S.currentCampaign.masterUid === u?.uid;
                return `<aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">📜</div>
      <h2>Vexus RPG</h2>
      <div class="user-info">${u?.displayName || u?.email}</div>
      ${S.isAdmin ? '<div class="admin-badge">✦ Admin</div>' : ""}
      ${!S.isAdmin && isMasterOfCurrent ? '<div class="master-badge">⚔ Mestre</div>' : ""}
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Navegação</div>
        <div class="nav-item ${S.view === "campaigns" ? "active" : ""}" data-nav="campaigns">
          <span class="icon">🗺</span> Campanhas
        </div>
        ${
            S.isAdmin
                ? `<div class="nav-item ${S.view === "admin" ? "active" : ""}" data-nav="admin">
          <span class="icon">⚙</span> Admin
        </div>`
                : ""
        }
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-sm" id="logout-btn"><span>↩ Sair</span></button>
    </div>
  </aside>`;
            }

            function renderContent() {
                if (S.view === "campaigns") return renderCampaigns();
                if (S.view === "campaign-detail") return renderCampaignDetail();
                if (S.view === "sheet-editor") return renderSheetEditor();
                if (S.view === "admin") return renderAdmin();
                return "";
            }

            // ═══════════════════════════════════════
            // CAMPAIGNS VIEW
            // ═══════════════════════════════════════
            function renderCampaigns() {
                const cards = S.campaigns
                    .map(
                        (c) => `
    <div class="campaign-card" data-cid="${c.id}">
      <div class="campaign-cover">
        ${c.coverUrl ? `<img src="${c.coverUrl}" alt="">` : ""}
        <span class="campaign-cover-icon">${c.icon || "⚔"}</span>
      </div>
      <div class="campaign-body">
        <h3>${c.name}</h3>
        <p>${c.description || "Sem descrição"}</p>
        <div class="campaign-meta">
          <span>📜 ${c.system || "Sistema livre"}</span>
          <span>👤 ${c.masterName || "Sem mestre"}</span>
        </div>
      </div>
    </div>`,
                    )
                    .join("");

                return `
    <div class="page-header"><h1>⚔ Campanhas</h1><p>Selecione uma campanha</p></div>
    <div class="campaigns-grid">
      ${cards}
      ${
          S.isAdmin
              ? `<div class="campaign-card add-campaign-card" id="new-camp-btn">
        <div style="font-size:32px">+</div>
        <div style="font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase">Nova Campanha</div>
      </div>`
              : ""
      }
    </div>
    <!-- MODAL NOVA CAMPANHA -->
    <div class="modal-overlay" id="camp-modal">
      <div class="modal">
        <button class="modal-close" id="camp-modal-close">✕</button>
        <h3>📜 Nova Campanha</h3>
        <div class="modal-form">
          <div class="field"><label>Nome</label><input id="c-name" placeholder="Nome da campanha"></div>
          <div class="field"><label>Descrição</label><input id="c-desc" placeholder="Descrição..."></div>
          <div class="field"><label>Sistema</label><input id="c-system" placeholder="D&D 5e, CoC, Livre..."></div>
          <div class="field"><label>Nome do Mestre</label><input id="c-master" placeholder="Nome do mestre"></div>
          <div class="field"><label>UID do Mestre (deixe vazio se for você)</label><input id="c-master-uid" placeholder="UID do usuário mestre"></div>
          <div class="field"><label>Ícone (emoji)</label><input id="c-icon" placeholder="⚔" maxlength="4"></div>
        </div>
        <div class="modal-actions">
          <button class="btn" id="camp-cancel"><span>Cancelar</span></button>
          <button class="btn btn-solid" id="camp-confirm"><span>Criar</span></button>
        </div>
      </div>
    </div>`;
            }

            // ═══════════════════════════════════════
            // CAMPAIGN DETAIL
            // ═══════════════════════════════════════
            function renderCampaignDetail() {
                const c = S.currentCampaign;
                const isMaster = S.isAdmin || c.masterUid === S.user?.uid;

                const sheetCards = S.sheets
                    .map((s) => {
                        const hp = s.hp ?? 0,
                            hpMax = s.hpMax ?? 1;
                        const san = s.san ?? 0,
                            sanMax = s.sanMax ?? 0;
                        const hpPct = Math.max(
                            0,
                            Math.min(100, (hp / hpMax) * 100),
                        );
                        const sanPct =
                            sanMax > 0
                                ? Math.max(
                                      0,
                                      Math.min(100, (san / sanMax) * 100),
                                  )
                                : 0;
                        return `
    <div class="sheet-card">
      <div class="sheet-card-body" data-sid="${s.id}">
        <div class="sheet-avatar">
          ${s.portraitUrl ? `<img src="${s.portraitUrl}" alt="">` : ""}
          <span class="sheet-avatar-icon">${s.portrait || "🧙"}</span>
        </div>
        <div class="sheet-info">
          <h4>${s.charName || "Sem nome"}</h4>
          <div class="sub">${s.race || "—"} · ${s.charClass || "—"} Nv.${s.level || 1}</div>
          <div class="bar-wrap">
            <div class="bar-label"><span>HP</span><span>${hp}/${hpMax}</span></div>
            <div class="bar-track"><div class="bar-fill bar-hp" style="width:${hpPct}%"></div></div>
          </div>
          ${
              sanMax > 0
                  ? `<div class="bar-wrap">
            <div class="bar-label"><span>SAN</span><span>${san}/${sanMax}</span></div>
            <div class="bar-track"><div class="bar-fill bar-san" style="width:${sanPct}%"></div></div>
          </div>`
                  : ""
          }
        </div>
      </div>
      ${
          isMaster
              ? `<div class="sheet-actions">
        <button class="btn btn-xs btn-danger" data-del-sheet="${s.id}"><span>🗑 Excluir</span></button>
      </div>`
              : ""
      }
    </div>`;
                    })
                    .join("");

                return `
    <div class="back-btn" id="back-camps">← Campanhas</div>
    <div class="campaign-banner">
      ${c.coverUrl ? `<img src="${c.coverUrl}" alt="">` : ""}
      <div class="campaign-banner-overlay">
        <h2>${c.icon || "⚔"} ${c.name}</h2>
        <p>${c.description || ""} · ${c.system || ""}</p>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div class="section-title" style="margin:0;border:none;padding:0"><span>📋</span> Fichas</div>
      <div style="display:flex;gap:8px">
        ${isMaster ? `<button class="btn btn-sm btn-blue" id="new-sheet-btn"><span>+ Nova Ficha</span></button>` : ""}
      </div>
    </div>
    <div class="sheets-grid">
      ${sheetCards}
      ${!S.sheets.length ? '<div class="empty"><div class="empty-icon">📄</div><p>Nenhuma ficha ainda.</p></div>' : ""}
    </div>`;
            }

            // ═══════════════════════════════════════
            // SHEET EDITOR
            // ═══════════════════════════════════════
            const DEFAULT_FIELDS = [
                {
                    key: "charName",
                    label: "Nome do Personagem",
                    type: "text",
                    locked: false,
                },
                { key: "level", label: "Nível", type: "number", locked: false },
                {
                    key: "charClass",
                    label: "Classe",
                    type: "text",
                    locked: false,
                },
                { key: "race", label: "Raça", type: "text", locked: false },
                {
                    key: "background",
                    label: "Antecedente",
                    type: "text",
                    locked: false,
                },
                {
                    key: "alignment",
                    label: "Alinhamento",
                    type: "text",
                    locked: false,
                },
            ];

            const DEFAULT_SKILLS = [
                "Acrobacia",
                "Arcanismo",
                "Atletismo",
                "Enganação",
                "Furtividade",
                "História",
                "Intimidação",
                "Intuição",
                "Investigação",
                "Lidar c/Animais",
                "Medicina",
                "Natureza",
                "Percepção",
                "Performance",
                "Persuasão",
                "Prestidigitação",
                "Religião",
                "Sobrevivência",
            ];

            const STATS = [
                { k: "str", l: "FOR" },
                { k: "dex", l: "DES" },
                { k: "con", l: "CON" },
                { k: "int", l: "INT" },
                { k: "wis", l: "SAB" },
                { k: "cha", l: "CAR" },
            ];

            function renderSheetEditor() {
                const s = S.editData || S.currentSheet || {};
                const c = S.currentCampaign;
                const isMaster = S.isAdmin || c?.masterUid === S.user?.uid;
                const fields = c?.customFields || DEFAULT_FIELDS;
                const tab = S.activeTab;

                const tabs = [
                    { id: "basics", label: "📋 Básico" },
                    { id: "stats", label: "⚔ Atributos" },
                    { id: "vitals", label: "❤ Vitais" },
                    { id: "skills", label: "🎯 Perícias" },
                    { id: "inventory", label: "🎒 Inventário" },
                    { id: "spells", label: "✨ Magias" },
                    { id: "currency", label: "💰 Moedas" },
                    { id: "notes", label: "📝 Notas" },
                    ...(isMaster
                        ? [{ id: "builder", label: "🔧 Campos" }]
                        : []),
                ];

                return `
    <div class="sheet-editor">
      <div class="back-btn" id="back-detail">← ${c?.name || "Campanha"}</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
        <div>
          <h1 style="font-family:'Cinzel',serif;font-size:24px;color:var(--gold)">${s.charName || "Nova Ficha"}</h1>
          <p style="color:var(--text2);font-style:italic">${s.race || ""} ${s.charClass ? "· " + s.charClass : ""}</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          ${
              isMaster && S.currentSheet
                  ? `<div style="position:relative">
            <button class="btn btn-sm" id="sheet-menu-btn" title="Opções"><span>⋯</span></button>
            <div id="sheet-menu" style="display:none;position:absolute;right:0;top:100%;background:var(--bg2);border:1px solid var(--border);z-index:100;min-width:160px;margin-top:4px">
              <div class="sheet-menu-item" id="copy-sheet-btn" style="padding:10px 16px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em;color:var(--text2);transition:all .15s">📋 Duplicar Ficha</div>
            </div>
          </div>`
                  : ""
          }
          <button class="btn btn-solid" id="save-sheet-btn"><span>💾 Salvar</span></button>
        </div>
      </div>

      <div class="tabs">${tabs.map((t) => `<div class="tab ${tab === t.id ? "active" : ""}" data-tab="${t.id}">${t.label}</div>`).join("")}</div>

      <div id="tab-content">${renderTabContent(tab, s, isMaster, fields, c)}</div>
    </div>`;
            }

            function renderTabContent(tab, s, isMaster, fields, c) {
                if (tab === "basics")
                    return renderTabBasics(s, isMaster, fields, c);
                if (tab === "stats") return renderTabStats(s, isMaster, c);
                if (tab === "vitals") return renderTabVitals(s, isMaster, c);
                if (tab === "skills") return renderTabSkills(s, isMaster, c);
                if (tab === "inventory") return renderTabInventory(s, isMaster);
                if (tab === "spells") return renderTabSpells(s, isMaster);
                if (tab === "currency") return renderTabCurrency(s, isMaster);
                if (tab === "notes") return renderTabNotes(s, isMaster);
                if (tab === "builder") return renderTabBuilder(c, isMaster);
                return "";
            }

            function renderTabBasics(s, isMaster, fields, c) {
                const portrait = `
    <div class="portrait-wrap">
      <div class="sheet-portrait" id="portrait-btn">
        ${s.portraitUrl ? `<img src="${s.portraitUrl}" alt="">` : `<span style="font-size:44px">${s.portrait || "🧙"}</span>`}
        <div class="upload-hint">Trocar</div>
      </div>
      <input id="portrait-emoji" value="${s.portrait || "🧙"}" maxlength="4"
        style="width:56px;background:var(--bg2);border:1px solid var(--border);color:var(--text);text-align:center;font-size:22px;padding:4px;outline:none">
    </div>`;

                const coreFields = fields.map((f) => {
                    const locked = f.locked && !isMaster;
                    return `<div class="field">
      <label>${f.label} ${f.locked ? "🔒" : ""}</label>
      <input type="${f.type || "text"}" id="f-${f.key}" value="${s[f.key] || ""}" ${locked ? "disabled" : ""}>
    </div>`;
                });

                // Custom text fields
                const customFields = (c?.extraFields || [])
                    .filter((f) => f.type === "text" || f.type === "number")
                    .map((f) => {
                        const locked = !isMaster; // custom fields always locked for players
                        const val = s.custom?.[f.key] || "";
                        return `<div class="custom-field-item">
      <span class="custom-field-label">${f.label} ${locked ? "🔒" : ""}</span>
      <input class="custom-field-value" data-custom="${f.key}" value="${val}" ${locked ? "disabled" : ""} type="${f.type || "text"}">
    </div>`;
                    });

                const memberNames = S.currentCampaign?.memberNames || [];
                const playerOptions = (S.currentCampaign?.members || [])
                    .map((uid) => {
                        const selected = s.playerUid === uid ? "selected" : "";
                        const member = memberNames.find((m) => m.uid === uid);
                        const label =
                            uid === S.user?.uid
                                ? "Você (" +
                                  (S.user.displayName || S.user.email) +
                                  ")"
                                : member?.name || member?.email || uid;
                        return `<option value="${uid}" ${selected}>${label}</option>`;
                    })
                    .join("");

                const playerField = isMaster
                    ? `
    <div class="divider">Jogador Responsável</div>
    <div class="field">
      <label>Atribuir ficha ao jogador</label>
      <select id="f-playerUid">
        <option value="">Nenhum (ficha do mestre)</option>
        ${playerOptions}
      </select>
    </div>`
                    : "";

                return `
    <div style="display:grid;grid-template-columns:130px 1fr;gap:24px;align-items:start">
      ${portrait}
      <div class="core-grid">
        ${coreFields.join("")}
      </div>
    </div>
    ${customFields.length ? `<div class="divider">Campos Extras</div>${customFields.join("")}` : ""}
    ${playerField}`;
            }

            function renderTabStats(s, isMaster, c) {
                const statLocks = c?.statLocks || {};
                const useBaseStats = c?.useBaseStats !== false; // default true

                const statBoxes = useBaseStats
                    ? STATS.map(({ k, l }) => {
                          const val = s[k] || 10;
                          const mod = Math.floor((val - 10) / 2);
                          const locked = !isMaster; // players cannot edit stats
                          return `<div class="stat-box">
      <label>${l}</label>
      <input type="number" class="stat-input" data-key="${k}" value="${val}" min="1" max="30" ${locked ? "disabled" : ""}>
      <div class="stat-mod">${mod >= 0 ? "+" + mod : mod}</div>
      ${isMaster ? `<span class="lock-icon ${statLocks[k] ? "locked" : ""}" data-lock-stat="${k}" title="Travar campo">${statLocks[k] ? "🔒" : "🔓"}</span>` : '<span style="font-size:10px;color:var(--text3)">🔒</span>'}
    </div>`;
                      }).join("")
                    : "";

                const extraStats = (c?.extraFields || [])
                    .filter((f) => f.type === "stat")
                    .map((f) => {
                        const val = s.custom?.[f.key] || 10;
                        const locked = !isMaster; // always locked for players
                        return `<div class="stat-box">
      <label>${f.label} ${locked ? "🔒" : ""}</label>
      <input type="number" class="custom-field-value" data-custom="${f.key}" value="${val}" min="0" ${locked ? "disabled" : ""}>
      ${isMaster ? `<span class="lock-icon ${f.locked ? "locked" : ""}" data-lock-extra="${f.key}" title="Travar">${f.locked ? "🔒" : "🔓"}</span>` : ""}
    </div>`;
                    })
                    .join("");

                return `
    ${
        useBaseStats
            ? `<div class="section-title"><span>⚔</span> Atributos Base</div>
    <div class="stats-row">${statBoxes}${extraStats}</div>`
            : `
    <div class="section-title"><span>⚔</span> Atributos Personalizados</div>
    <div class="stats-row">${extraStats}</div>
    ${!extraStats ? '<p style="color:var(--text3);font-style:italic;font-size:13px;margin-bottom:16px">Nenhum atributo criado. Use a aba 🔧 Campos para adicionar.</p>' : ""}`
    }
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div class="field"><label>Iniciativa</label><input type="number" id="f-initiative" value="${s.initiative || 0}"></div>
      <div class="field"><label>Classe de Armadura</label><input type="number" id="f-ac" value="${s.ac || 10}"></div>
      <div class="field"><label>Bônus de Proficiência</label><input type="number" id="f-profBonus" value="${s.profBonus || 2}" min="1" max="9"></div>
    </div>`;
            }

            function renderTabVitals(s, isMaster, c) {
                const useSan = c?.useSanity || s.sanMax > 0;
                const hp = s.hp ?? s.hpMax ?? 10,
                    hpMax = s.hpMax ?? 10;
                const san = s.san ?? s.sanMax ?? 10,
                    sanMax = s.sanMax ?? 10;
                const hpPct = Math.max(0, Math.min(100, (hp / hpMax) * 100));
                const sanPct = Math.max(0, Math.min(100, (san / sanMax) * 100));

                const extraVitals = (c?.extraFields || [])
                    .filter((f) => f.type === "vital")
                    .map((f) => {
                        const cur = s.custom?.[f.key] ?? f.max ?? 10;
                        const max = s.custom?.[f.key + "Max"] ?? f.max ?? 10;
                        const pct = Math.max(
                            0,
                            Math.min(100, (cur / max) * 100),
                        );
                        const vitLocked = !isMaster;
                        return `<div class="vital-box">
      <div class="vital-title">${f.label} ${vitLocked ? "🔒" : ""}</div>
      <div class="vital-numbers">
        <div class="vital-cur" id="vit-cur-${f.key}" style="color:${f.color || "var(--gold)"}">${cur}</div>
        <div class="vital-sep">/</div>
        <div class="vital-max" id="vit-max-${f.key}">${max}</div>
      </div>
      <div class="bar-track"><div class="bar-fill" id="vit-bar-${f.key}" style="width:${pct}%;background:${f.color || "var(--gold)"}"></div></div>
      <div class="vital-controls">
        <button class="btn btn-xs btn-danger" data-vit-dmg="${f.key}"><span>-</span></button>
        <input type="number" id="vit-delta-${f.key}" value="1" min="1">
        <button class="btn btn-xs btn-green" data-vit-heal="${f.key}"><span>+</span></button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
        <div class="field"><label>Atual</label><input type="number" id="vit-finput-${f.key}" data-custom="${f.key}" value="${cur}" ${vitLocked ? "disabled" : ""}></div>
        <div class="field"><label>Máximo</label><input type="number" id="vit-maxinput-${f.key}" data-custom="${f.key}Max" value="${max}" ${vitLocked ? "disabled" : ""}></div>
      </div>
    </div>`;
                    })
                    .join("");

                return `
    <div class="vitals-grid">
      <!-- HP -->
      <div class="vital-box">
        <div class="vital-title">PONTOS DE VIDA</div>
        <div class="vital-numbers">
          <div class="vital-cur hp" id="hp-cur">${hp}</div>
          <div class="vital-sep">/</div>
          <div class="vital-max" id="hp-max-disp">${hpMax}</div>
        </div>
        <div class="bar-track"><div class="bar-fill bar-hp" id="hp-bar" style="width:${hpPct}%"></div></div>
        <div class="vital-controls">
          <button class="btn btn-xs btn-danger" id="hp-dmg"><span>⚔ -</span></button>
          <input type="number" id="hp-delta" value="1" min="1">
          <button class="btn btn-xs btn-green" id="hp-heal"><span>✦ +</span></button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
          <div class="field"><label>HP Atual</label><input type="number" id="f-hp" value="${hp}"></div>
          <div class="field"><label>HP Máximo</label><input type="number" id="f-hpMax" value="${hpMax}"></div>
        </div>
        <div class="field" style="margin-top:8px"><label>HP Temporário</label><input type="number" id="f-hpTemp" value="${s.hpTemp || 0}"></div>
      </div>

      <!-- SANIDADE -->
      ${
          useSan
              ? `<div class="vital-box">
        <div class="vital-title">SANIDADE</div>
        <div class="vital-numbers">
          <div class="vital-cur san" id="san-cur">${san}</div>
          <div class="vital-sep">/</div>
          <div class="vital-max" id="san-max-disp">${sanMax}</div>
        </div>
        <div class="bar-track"><div class="bar-fill bar-san" id="san-bar" style="width:${sanPct}%"></div></div>
        <div class="vital-controls">
          <button class="btn btn-xs btn-danger" id="san-dmg"><span>🧠 -</span></button>
          <input type="number" id="san-delta" value="1" min="1">
          <button class="btn btn-xs btn-green" id="san-heal"><span>✦ +</span></button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
          <div class="field"><label>San Atual</label><input type="number" id="f-san" value="${san}"></div>
          <div class="field"><label>San Máxima</label><input type="number" id="f-sanMax" value="${sanMax}"></div>
        </div>
      </div>`
              : `<div class="vital-box" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text3)">
        <div style="font-size:32px">🧠</div>
        <div style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em">Sanidade desativada</div>
        ${isMaster ? `<button class="btn btn-sm" id="enable-san-btn"><span>Ativar Sanidade</span></button>` : ""}
      </div>`
      }
    </div>
    ${extraVitals ? `<div class="divider">Vitais Extras</div><div class="vitals-grid">${extraVitals}</div>` : ""}`;
            }

            function renderTabSkills(s, isMaster, c) {
                // campaignSkills: [{name, useProf, baseValue, locked}]
                const campSkills =
                    c?.campaignSkills ||
                    DEFAULT_SKILLS.map((name) => ({
                        name,
                        useProf: true,
                        baseValue: 0,
                        locked: false,
                        enabled: true,
                    }));
                const enabledSkills = campSkills.filter(
                    (sk) => sk.enabled !== false,
                );
                const charSkills = s.skills || {}; // {skillName: {prof: bool, bonus: number}}

                if (isMaster) {
                    return `
      <div class="section-title"><span>🎯</span> Perícias do Personagem</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
        ${enabledSkills
            .map((sk) => {
                const cs = charSkills[sk.name] || {};
                const hasProf = cs.prof || false;
                const bonus = cs.bonus || 0;
                const total =
                    (sk.baseValue || 0) +
                    bonus +
                    (hasProf ? s.profBonus || 2 : 0);
                return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border)">
            <div class="skill-dot skill-prof-toggle" data-skill-name="${sk.name}" style="cursor:pointer;border-color:${hasProf ? "var(--gold)" : "var(--border)"};background:${hasProf ? "var(--gold)" : "transparent"};color:${hasProf ? "var(--bg)" : "transparent"};width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:9px">✦</div>
            <span style="flex:1;font-size:14px;color:${hasProf ? "var(--gold)" : "var(--text)"}">${sk.name}</span>
            <span style="font-size:11px;color:var(--text3)">Base: ${sk.baseValue || 0}</span>
            <span style="font-size:11px;color:var(--text2)">Bônus:</span>
            <input type="number" class="skill-bonus-input" data-skill-name="${sk.name}" value="${bonus}" style="width:50px;background:var(--bg2);border:1px solid var(--border);color:var(--text);text-align:center;font-family:'Cinzel',serif;font-size:13px;padding:3px;outline:none">
            <span style="font-family:'Cinzel',serif;font-size:16px;color:var(--gold);min-width:30px;text-align:right">${total >= 0 ? "+" + total : total}</span>
          </div>`;
            })
            .join("")}
      </div>`;
                } else {
                    return `
      <div class="section-title"><span>🎯</span> Perícias <span style="font-size:11px;color:var(--text3)">(somente leitura)</span></div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
        ${enabledSkills
            .map((sk) => {
                const cs = charSkills[sk.name] || {};
                const hasProf = cs.prof || false;
                const bonus = cs.bonus || 0;
                const total =
                    (sk.baseValue || 0) +
                    bonus +
                    (hasProf ? s.profBonus || 2 : 0);
                return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border)">
